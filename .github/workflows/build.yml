name: build

# Release publishing. The multi-arch push to ghcr.io is GATED on the full CI
# suite: the `ci` job below calls .github/workflows/ci.yml (backend, frontend,
# agent, alembic drift, image validation) at this same commit, and `image`
# refuses to run until it passes. Before 2026-07-20 the push had no gate at
# all — and on v* tags no CI even ran, since ci.yml only triggered on PRs and
# main. This workflow is now the ONLY thing that runs CI on main/tag pushes;
# ci.yml itself keeps just the pull_request trigger to avoid double runs.
#
# Action pins: full commit SHAs with the semver in a trailing comment — see
# the header of ci.yml for the rationale; .github/dependabot.yml keeps them
# current.

on:
  push:
    branches: [main]
    tags: ["v*"]

# Queue rather than cancel: interrupting an in-flight publish mid-push could
# leave a moved tag half-updated on ghcr.io. Superseded runs wait their turn.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    # Runs the entire CI workflow (all five jobs) at this commit. Job-level
    # permissions here cap what the called workflow's GITHUB_TOKEN can do.
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  image:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The ci call's validation build just wrote amd64 layers to the GHA
          # cache at this same ref — reuse them so gating doesn't double the
          # wall time; mode=max also caches arm64 for the next release.
          cache-from: type=gha
          cache-to: type=gha,mode=max

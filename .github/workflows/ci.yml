name: ci

# CI gate: lint + backend tests + frontend check + agent (Go) + alembic drift
# must all pass BEFORE the docker image is built. The `image` build here is a
# no-push validation only — release publishing lives in build.yml, which CALLS
# this whole workflow (see `workflow_call` below) as its gate before pushing
# to ghcr.io.
#
# Every `uses:` is pinned to a full commit SHA with the semver in a trailing
# comment. A `@vN` tag is MUTABLE — whoever controls it can repoint it at any
# commit, which then runs with this workflow's token and secrets. A SHA cannot
# be moved. Keep the comment in sync with the SHA; .github/dependabot.yml bumps
# both together, so take action upgrades as reviewable Dependabot PRs rather
# than hand-editing a pin.
#
# Checkouts also set `persist-credentials: false` so the auto-injected
# GITHUB_TOKEN is never persisted for later steps (and the third-party code
# `npm ci` / `uv sync` / `go test` execute right after) to pick up. checkout v6+
# stores it under $RUNNER_TEMP rather than .git/config, which narrows the
# exposure but does not remove it — keep the flag.

on:
  pull_request:
  # Callable as a gate: build.yml runs this entire suite and waits on it before
  # publishing to ghcr.io — on BOTH main pushes and v* tags (tags never
  # triggered CI at all before this existed). Direct pushes to main get their
  # CI through that call, so a separate `push: main` trigger here would just
  # run everything twice per push.
  workflow_call:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: backend (lint + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        # The integration tests need a real Postgres. pgserver (the local
        # embedded fallback) ships no cp313 wheel, so on the 3.13 CI runner we
        # point FILEARR_TEST_DATABASE_URL at this service instead; conftest's
        # _PGProvider hands out an isolated database per test module. Postgres 18
        # provides native uuidv7() (the conftest shim is a no-op on it).
        image: postgres:18
        env:
          POSTGRES_USER: filearr
          POSTGRES_PASSWORD: filearr
          POSTGRES_DB: filearr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U filearr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # conftest's _PGProvider uses this as the admin URI (CREATEDB rights) and
      # creates one throwaway database per test module off it.
      FILEARR_TEST_DATABASE_URL: postgresql://filearr:filearr@localhost:5432/filearr
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ffmpeg (ffprobe) + media libs for extractors
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg libmagic1 libmediainfo0v5

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Sync dependencies (incl. dev group)
        run: uv sync --dev

      - name: Ruff (lint gate)
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q

  frontend:
    name: frontend (svelte-check + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          # Matches the Dockerfile's `node:24-slim` build stage.
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install (clean, lockfile-exact)
        run: npm ci

      - name: Type/component check
        run: npm run check

      # tests/ is outside tsconfig.json's `include` (the app config is
      # browser-only), so these two gates are what keep the Node-runner tests
      # honest. They ran nowhere before — not in package.json, not in CI.
      - name: Type-check tests
        run: npm run check:tests

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  agent:
    name: agent (go vet + test + cross-compile)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Vet
        run: go vet ./...

      # Protocol tests run a real step-ca authority in-process (smallstep/
      # certificates is a library) — no service container needed.
      - name: Test
        run: go test ./...

      - name: Cross-compile matrix (static, no cgo)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/filearr-agent
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/filearr-agent
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -o /dev/null ./cmd/filearr-agent

  alembic-check:
    name: alembic drift check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        # Postgres 18 provides native uuidv7(); the baseline migration requires
        # it (fails fast otherwise) and the ORM server defaults call it, so we
        # deliberately run the real 18 image rather than shimming an older one.
        image: postgres:18
        env:
          POSTGRES_USER: filearr
          POSTGRES_PASSWORD: filearr
          POSTGRES_DB: filearr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U filearr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # env.py resolves the DB URL from FILEARR_DATABASE_URL via filearr.config.
      FILEARR_DATABASE_URL: postgresql+psycopg://filearr:filearr@localhost:5432/filearr
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev

      - name: Upgrade DB to head
        run: uv run alembic upgrade head

      - name: Check models match migrations (no drift)
        # Fails if the SQLAlchemy models have diverged from the migration chain
        # (i.e. someone changed models.py without generating a migration).
        run: uv run alembic check

  image:
    name: docker image (no push)
    runs-on: ubuntu-latest
    # True gate: only build the image once EVERY suite has passed — backend,
    # frontend, agent, and migration drift. (`agent` was missing here until
    # 2026-07-20: a broken Go agent did not block the image build.)
    needs: [backend, frontend, agent, alembic-check]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build multi-stage image (validation only, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
